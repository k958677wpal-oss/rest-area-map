<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }

    .top-right-btns {
      position: absolute; top: 10px; right: 10px; z-index: 100;
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .map-btn {
      padding: 8px 12px; font-size: 13px; border: none; border-radius: 6px;
      color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: pointer;
      white-space: nowrap;
    }
    #resetBtn { background: #333; }
    #showAllRoutesBtn { background: #2F5597; }

    /* 브랜드 점유율 대시보드 */
    #brandStats {
      position: absolute; top: 10px; left: 10px; z-index: 100;
      width: max-content;
      max-width: calc(100% - 20px);
      background: rgba(255,255,255,0.92);
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      overflow: hidden;
      font-size: 12px;
    }
    #brandStats .bs-header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.04);
    }
    #brandStats .bs-titlebox { display: flex; flex-direction: column; }
    #brandStats .bs-title { font-weight: 700; color: #333; white-space: nowrap; }
    #brandStats .bs-route { font-size: 11px; color: #2F5597; font-weight: 600; white-space: nowrap; }
    #brandStats .bs-toggle {
      display: block;
      margin-left: auto;
      border: none; background: transparent;
      font-size: 13px; color: #555; cursor: pointer; padding: 2px 6px;
      line-height: 1;
    }
    #brandStats .bs-body {
      display: flex;
      align-items: stretch;
    }
    #brandStats .bs-cell {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 10px;
      border-left: 1px solid rgba(0,0,0,0.08);
      min-width: 54px;
    }
    #brandStats .bs-cell:first-child { border-left: none; }
    #brandStats .bs-name { font-weight: 700; margin-bottom: 2px; white-space: nowrap; }
    #brandStats .bs-value { color: #333; white-space: nowrap; }
    #brandStats .bs-GS25 .bs-name { color: #2770BF; }
    #brandStats .bs-CU .bs-name { color: #710E82; }
    #brandStats .bs-emart .bs-name { color: #C99700; }
    #brandStats .bs-seven .bs-name { color: #FF6C00; }
    #brandStats .bs-etc .bs-name { color: #888; }
    #brandStats.is-collapsed .bs-body { display: none; }

    @media (max-width: 768px) {
      #brandStats { font-size: 11px; }
      #brandStats .bs-body {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0;
      }
      #brandStats .bs-cell {
        border-left: none;
        border-top: 1px solid rgba(0,0,0,0.08);
        min-width: 0;
        padding: 6px 4px;
      }
    }

    #debugPanel {
      position: absolute; left: 0; bottom: 0; z-index: 100;
      max-height: 35%; width: 100%; overflow-y: auto;
      background: rgba(0,0,0,.8); color: #0f0; font: 12px monospace;
      padding: 6px; display: none; white-space: pre-wrap;
    }
    /* 노선 라벨: 배경색은 JS에서 노선 색으로 지정 */
    .highway-label {
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      white-space: nowrap;
      transform: translate(-50%, -130%);
    }

    .marker-pin {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      opacity: 1;
      transition: opacity .2s ease;
    }

    .pin-graphics {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: 50% 100%;
      transition: transform .2s ease;
    }

    .marker-pin .pin-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      border: 3px solid #ffffff;
      box-shadow: 0 3px 8px rgba(0,0,0,.35);
      box-sizing: border-box;
    }
    .marker-pin .pin-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .marker-pin .pin-tail {
      width: 0;
      height: 0;
      margin-top: -3px;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid #ffffff;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.3));
      pointer-events: none;
    }
    .marker-pin.is-dim { opacity: 0.3; }
    .marker-pin.is-small .pin-graphics { transform: scale(0.55); }

    .pin-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .12s ease;
      z-index: 30;
    }
    .pin-tooltip b { font-size: 13px; }
    .marker-pin:hover .pin-tooltip {
      opacity: 1;
      visibility: visible;
    }

    .iw-wrap {
      pointer-events: none;
      position: relative;
      margin-bottom: 34px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      min-width: 180px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
    }
    .iw-close {
      pointer-events: auto;
      position: absolute;
      top: 6px;
      right: 8px;
      width: 20px;
      height: 20px;
      line-height: 20px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      border-radius: 50%;
    }
    .iw-close:hover { background: #eee; color: #333; }
    .iw-title { font-size: 14px; font-weight: 700; padding-right: 18px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="brandStats" class="is-collapsed"></div>

  <div class="top-right-btns">
    <button id="resetBtn" class="map-btn">전체 보기</button>
    <button id="showAllRoutesBtn" class="map-btn">전체 노선 보기</button>
  </div>

  <div id="debugPanel"></div>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fbd1e96068b754f1939c7e11a2790ce1&autoload=false"></script>
  <script>
    var BRAND_IMAGES = {
      "GS25": "images/GS25.PNG",
      "CU": "images/CU.PNG",
      "7-11": "images/7-11.PNG",
      "이마트24": "images/emart24.PNG",
      "기타": "images/ect.PNG"
    };
    function resolveBrandImage(brand) {
      if (brand === "세븐일레븐") return BRAND_IMAGES["7-11"];
      if (BRAND_IMAGES[brand]) return BRAND_IMAGES[brand];
      return BRAND_IMAGES["기타"];
    }

    var BRAND_COLORS = {
      "GS25": "#2770BF",
      "CU": "#710E82",
      "세븐일레븐": "#FF6C00",
      "7-11": "#FF6C00",
      "이마트24": "#FFC000",
      "기타": "#BFBFBF"
    };
    function resolveBrandColor(brand) {
      if (BRAND_COLORS[brand]) return BRAND_COLORS[brand];
      return BRAND_COLORS["기타"];
    }

    // =========================================================
    // [신규] 노선별 색상 자동 배정
    // - 노선명을 해시값으로 바꿔 팔레트에서 색을 고릅니다.
    // - 같은 노선명은 항상 같은 색이 나옵니다(일관성).
    // =========================================================
    var ROUTE_COLOR_PALETTE = [
      "#E6194B", "#3CB44B", "#4363D8", "#F58231", "#911EB4",
      "#008080", "#9A6324", "#800000", "#808000", "#000075",
      "#E6799A", "#46F0F0", "#F032E6", "#BCBD22", "#17BECF",
      "#D2691E", "#1F77B4", "#2CA02C", "#8C564B", "#E377C2"
    ];
    function getRouteColor(highway) {
      var s = String(highway || "");
      var hash = 0;
      for (var i = 0; i < s.length; i++) {
        hash = (hash * 31 + s.charCodeAt(i)) % 1000000007;
      }
      var idx = Math.abs(hash) % ROUTE_COLOR_PALETTE.length;
      return ROUTE_COLOR_PALETTE[idx];
    }

    var BRAND_STAT_ORDER = [
      { key: "GS25",   label: "GS25",   cls: "bs-GS25" },
      { key: "CU",     label: "CU",     cls: "bs-CU" },
      { key: "이마트24", label: "이마트24", cls: "bs-emart" },
      { key: "7-11",   label: "7-11",   cls: "bs-seven" },
      { key: "매점",    label: "매점",    cls: "bs-etc" }
    ];

    function classifyBrand(brand) {
      var b = (brand == null ? "" : String(brand)).trim();
      if (b === "GS25") return "GS25";
      if (b === "CU") return "CU";
      if (b === "이마트24") return "이마트24";
      if (b === "세븐일레븐" || b === "7-11") return "7-11";
      return "매점";
    }

    var brandStatsCollapsed = true;

    function updateBrandStats(markers, routeLabel) {
      var counts = { "GS25": 0, "CU": 0, "이마트24": 0, "7-11": 0, "매점": 0 };
      var total = 0;

      (markers || []).forEach(function (item) {
        counts[classifyBrand(item.point.brand)] += 1;
        total += 1;
      });

      var cellsHtml = "";
      BRAND_STAT_ORDER.forEach(function (b) {
        var cnt = counts[b.key];
        var pct = (total > 0) ? Math.round((cnt / total) * 100) : 0;
        cellsHtml += '<div class="bs-cell ' + b.cls + '">' +
                       '<span class="bs-name">' + b.label + '</span>' +
                       '<span class="bs-value">' + cnt + '(' + pct + '%)</span>' +
                     '</div>';
      });

      var arrow = brandStatsCollapsed ? '▼' : '▲';

      var html =
        '<div class="bs-header">' +
          '<div class="bs-titlebox">' +
            '<span class="bs-title">브랜드 점유율</span>' +
            '<span class="bs-route">(' + (routeLabel || '전체노선') + ')</span>' +
          '</div>' +
          '<button class="bs-toggle" id="bsToggle">' + arrow + '</button>' +
        '</div>' +
        '<div class="bs-body">' + cellsHtml + '</div>';

      var container = document.getElementById('brandStats');
      container.innerHTML = html;

      if (brandStatsCollapsed) {
        container.classList.add('is-collapsed');
      } else {
        container.classList.remove('is-collapsed');
      }

      var toggleBtn = document.getElementById('bsToggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          brandStatsCollapsed = !brandStatsCollapsed;
          container.classList.toggle('is-collapsed', brandStatsCollapsed);
          toggleBtn.textContent = brandStatsCollapsed ? '▼' : '▲';
        });
      }
    }

    var SMALL_MARKER_ZOOM_LEVEL = 10;

    // [신규] 전체 노선 보기에서 라벨을 보여줄 최대 줌 레벨.
    // 카카오맵은 숫자가 작을수록 확대. level이 이 값보다 크면(축소/전국뷰) 라벨을 숨깁니다.
    var LABEL_MAX_ZOOM_LEVEL = 9;
    // [신규] 라벨끼리 이 픽셀 거리보다 가까우면 겹침으로 보고 뒤 라벨을 숨김
    var LABEL_MIN_GAP_PX = 70;

    var Z_BASE = 2;
    var Z_HIGHLIGHT = 10;
    var Z_DIM = 1;
    var Z_HOVER = 9999;

    var map, infowindow = null, allMarkers = [];

    var allPolylines = [];
    var allLabels = [];
    // [신규] 현재 '전체 노선 보기' 모드인지 여부 (라벨 표시 규칙이 달라짐)
    var isShowingAllRoutes = false;

    var DEBUG = false;
    var mapReady = false;
    var pendingMapData = null;

    window.closeInfoWindow = function () {
      if (infowindow) infowindow.close();
    };

    function log(msg) {
      if (!DEBUG) return;
      var el = document.getElementById('debugPanel');
      el.textContent += msg + "\n";
      el.scrollTop = el.scrollHeight;
    }

    function normalize(s) {
      return (s == null ? "" : String(s)).replace(/\s+/g, "").trim();
    }

    function setMarkerZ(item, z, isBaseChange) {
      item.el.style.zIndex = z;
      item.overlay.setZIndex(z);
      if (isBaseChange) {
        item.baseZIndex = z;
      }
    }

    function buildTitle(p) {
      var hw = (p.highway == null ? "" : String(p.highway)).trim();
      if (hw !== "") {
        return p.name + '(' + hw + ')';
      }
      return p.name;
    }

    function buildContent(p) {
      return '<div class="iw-wrap">' +
               '<span class="iw-close" onclick="closeInfoWindow()">×</span>' +
               '<div class="iw-title">' + buildTitle(p) + '</div>' +
               '연매출액: ' + p.revenue + '<br>' +
               '브랜드: ' + p.brand + '<br>' +
               '운영사: ' + p.operator + '<br>' +
               '계약기간: ' + p.contract + '<br>' +
               '계약차수: ' + (p.contract_step != null ? p.contract_step : '') + '<br>' +
               '담당자: ' + p.manager +
             '</div>';
    }

    function buildTooltipContent(p) {
      return '<b>' + buildTitle(p) + '</b><br>' +
             '브랜드: ' + p.brand + '<br>' +
             '연매출액: ' + p.revenue;
    }

    function createPinElement(p) {
      var wrap = document.createElement('div');
      wrap.className = 'marker-pin';

      var tooltip = document.createElement('div');
      tooltip.className = 'pin-tooltip';
      tooltip.innerHTML = buildTooltipContent(p);

      var graphics = document.createElement('div');
      graphics.className = 'pin-graphics';

      var circle = document.createElement('div');
      circle.className = 'pin-circle';
      circle.style.borderColor = resolveBrandColor(p.brand);

      var img = document.createElement('img');
      img.src = resolveBrandImage(p.brand);
      img.alt = p.brand || '';
      circle.appendChild(img);

      var tail = document.createElement('div');
      tail.className = 'pin-tail';
      tail.style.borderTopColor = resolveBrandColor(p.brand);

      graphics.appendChild(circle);
      graphics.appendChild(tail);

      wrap.appendChild(tooltip);
      wrap.appendChild(graphics);
      return wrap;
    }

    function clearRoute() {
      allPolylines.forEach(function (pl) { pl.setMap(null); });
      allLabels.forEach(function (lb) { lb.overlay.setMap(null); });
      allPolylines = [];
      allLabels = [];
    }

    function squaredDistance(a, b) {
      var dLat = a.lat - b.lat;
      var dLng = a.lng - b.lng;
      return dLat * dLat + dLng * dLng;
    }

    function computeSortedGroup(highway) {
      var target = normalize(highway);

      var group = allMarkers.filter(function (item) {
        return normalize(item.point.highway) === target;
      });
      if (group.length < 2) return group;

      var farA = 0, farB = 1, maxDist = -1;
      for (var i = 0; i < group.length; i++) {
        for (var k = i + 1; k < group.length; k++) {
          var d = squaredDistance(group[i].point, group[k].point);
          if (d > maxDist) {
            maxDist = d;
            farA = i;
            farB = k;
          }
        }
      }

      var remaining = group.slice();
      var startIdx = farA;

      var sorted = [];
      var current = remaining.splice(startIdx, 1)[0];
      sorted.push(current);

      while (remaining.length > 0) {
        var nearestIdx = 0;
        var nearestDist = squaredDistance(current.point, remaining[0].point);

        for (var j = 1; j < remaining.length; j++) {
          var dd = squaredDistance(current.point, remaining[j].point);
          if (dd < nearestDist) {
            nearestDist = dd;
            nearestIdx = j;
          }
        }

        current = remaining.splice(nearestIdx, 1)[0];
        sorted.push(current);
      }

      log('📐 최대거리 시작점 + 최근접 이웃 정렬: "' + highway + '" (' + sorted.length + '개, 시작점=' + sorted[0].point.name + ')');
      return sorted;
    }

    // [변경] 노선별 색상 적용. label 항목에 color도 저장.
    function drawSingleRoute(highway) {
      var group = computeSortedGroup(highway);
      if (group.length < 2) {
        log('❌ "' + highway + '" 소속 휴게소가 2개 미만이라 노선 생략 (' + group.length + '개)');
        return;
      }

      var color = getRouteColor(highway);

      var path = group.map(function (item) {
        return new kakao.maps.LatLng(item.point.lat, item.point.lng);
      });

      var polyline = new kakao.maps.Polyline({
        path: path,
        strokeWeight: 4,
        strokeColor: color,
        strokeOpacity: 0.9,
        strokeStyle: 'solid'
      });
      polyline.setMap(map);
      allPolylines.push(polyline);

      var labelOverlay = new kakao.maps.CustomOverlay({
        position: path[Math.floor(path.length / 2)],
        content: '<div class="highway-label" style="background:' + color + ';">' + highway + '</div>',
        yAnchor: 1,
        zIndex: 15
      });
      // 라벨은 일단 만들어 두고, updateLabelPosition에서 표시 여부를 결정
      allLabels.push({ overlay: labelOverlay, path: path, color: color });

      log('✅ 노선 그림: "' + highway + '" (' + path.length + '개 좌표)');
    }

    function drawRoute(highway) {
      clearRoute();
      if (!normalize(highway)) {
        log('❌ 고속도로명이 비어있어 노선을 그릴 수 없습니다.');
        return;
      }
      drawSingleRoute(highway);
      updateLabelPosition();
    }

    function showAllRoutes() {
      clearRoute();
      if (infowindow) infowindow.close();
      isShowingAllRoutes = true;   // 전체 노선 보기 모드 진입

      allMarkers.forEach(function (item) {
        item.el.classList.remove('is-dim');
        setMarkerZ(item, Z_BASE, true);
      });

      var seen = {};
      var highways = [];
      allMarkers.forEach(function (item) {
        var hw = item.point.highway;
        var key = normalize(hw);
        if (key && !seen[key]) {
          seen[key] = true;
          highways.push(hw);
        }
      });

      log('🛣 전체 노선 보기: ' + highways.length + '개 고속도로');
      highways.forEach(function (hw) { drawSingleRoute(hw); });
      updateLabelPosition();

      updateBrandStats(allMarkers, '전체노선');
    }

    // =========================================================
    // [변경] 라벨 위치/표시 갱신.
    // - 전체 노선 보기 모드 + 지도가 축소(전국뷰)면 → 모든 라벨 숨김
    // - 확대 상태면 화면 안에 들어온 노선만, 겹치지 않게 라벨 표시
    // - 단일 노선(전체보기 아님)이면 줌과 무관하게 항상 표시
    // =========================================================
    function updateLabelPosition() {
      if (!map || !allLabels.length) return;

      // 전체 노선 보기 + 축소 상태면 라벨을 전부 숨기고 종료
      if (isShowingAllRoutes && map.getLevel() > LABEL_MAX_ZOOM_LEVEL) {
        allLabels.forEach(function (lb) { lb.overlay.setMap(null); });
        return;
      }

      var bounds = map.getBounds();
      var center = map.getCenter();
      var cLat = center.getLat(), cLng = center.getLng();

      // 픽셀 좌표 변환기(겹침 판정용). 지원 안 되면 겹침 검사는 건너뜀.
      var projection = null;
      try { projection = map.getProjection(); } catch (e) { projection = null; }
      var placedPoints = [];  // 이미 배치한 라벨들의 화면 좌표

      allLabels.forEach(function (lb) {
        var path = lb.path;
        var best = null, bestDist = Infinity;
        for (var i = 0; i < path.length; i++) {
          var pt = path[i];
          if (!bounds.contain(pt)) continue;
          var dLat = pt.getLat() - cLat;
          var dLng = pt.getLng() - cLng;
          var dist = dLat * dLat + dLng * dLng;
          if (dist < bestDist) { bestDist = dist; best = pt; }
        }

        if (!best) {
          lb.overlay.setMap(null);   // 화면 밖 노선은 라벨 숨김
          return;
        }

        // 겹침 검사: 이미 배치된 라벨과 픽셀 거리가 너무 가까우면 숨김
        var tooClose = false;
        if (projection) {
          try {
            var cp = projection.containerPointFromCoords(best);
            for (var j = 0; j < placedPoints.length; j++) {
              var dx = cp.x - placedPoints[j].x;
              var dy = cp.y - placedPoints[j].y;
              if (Math.sqrt(dx * dx + dy * dy) < LABEL_MIN_GAP_PX) {
                tooClose = true;
                break;
              }
            }
            if (!tooClose) placedPoints.push(cp);
          } catch (e) {
            tooClose = false;
          }
        }

        if (tooClose) {
          lb.overlay.setMap(null);
        } else {
          lb.overlay.setPosition(best);
          lb.overlay.setMap(map);
        }
      });
    }

    function highlightMarkers(highway) {
      var target = normalize(highway);
      allMarkers.forEach(function (item) {
        if (normalize(item.point.highway) === target) {
          item.el.classList.remove('is-dim');
          setMarkerZ(item, Z_HIGHLIGHT, true);
        } else {
          item.el.classList.add('is-dim');
          setMarkerZ(item, Z_DIM, true);
        }
      });
    }

    function resetAll() {
      clearRoute();
      if (infowindow) infowindow.close();
      isShowingAllRoutes = false;   // 전체 노선 보기 모드 해제
      allMarkers.forEach(function (item) {
        item.el.classList.remove('is-dim');
        setMarkerZ(item, Z_BASE, true);
      });
      log('↺ 전체 초기화');

      updateBrandStats(allMarkers, '전체노선');
    }

    function selectHighway(p) {
      log('👉 selectHighway 실행: ' + p.name + ' / highway=' + p.highway);
      isShowingAllRoutes = false;   // 단일 노선 선택 → 전체 보기 모드 해제
      drawRoute(p.highway);
      highlightMarkers(p.highway);

      var target = normalize(p.highway);
      var group = allMarkers.filter(function (item) {
        return normalize(item.point.highway) === target;
      });
      if (group.length && target) {
        updateBrandStats(group, p.highway);
      } else {
        updateBrandStats(allMarkers, '전체노선');
      }
    }

    function activate(pos, p, content) {
      infowindow.setContent(content);
      infowindow.setPosition(pos);
      infowindow.open(map);
      selectHighway(p);
    }

    function applyMarkerScale() {
      if (!map) return;
      var level = map.getLevel();
      var small = level >= SMALL_MARKER_ZOOM_LEVEL;
      allMarkers.forEach(function (item) {
        if (small) {
          item.el.classList.add('is-small');
        } else {
          item.el.classList.remove('is-small');
        }
      });
    }

    function initMap(points, query) {
      log('총 마커 수: ' + (points ? points.length : 0));
      var container = document.getElementById('map');

      if (!map) {
        var center = (points && points.length)
          ? new kakao.maps.LatLng(points[0].lat, points[0].lng)
          : new kakao.maps.LatLng(36.5, 127.8);
        map = new kakao.maps.Map(container, { center: center, level: 8 });
        infowindow = new kakao.maps.InfoWindow({ zIndex: 20 });
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('showAllRoutesBtn').addEventListener('click', showAllRoutes);
        kakao.maps.event.addListener(map, 'idle', updateLabelPosition);
        // 줌이 바뀌면 마커 크기 + 라벨 표시 규칙 모두 갱신
        kakao.maps.event.addListener(map, 'zoom_changed', function () {
          applyMarkerScale();
          updateLabelPosition();
        });

        var bsEl = document.getElementById('brandStats');
        ['click', 'mousedown', 'touchstart', 'dblclick'].forEach(function (evt) {
          bsEl.addEventListener(evt, function (e) { e.stopPropagation(); });
        });
      } else {
        allMarkers.forEach(function (item) { item.overlay.setMap(null); });
        allMarkers = [];
        resetAll();
      }

      (points || []).forEach(function (p) {
        var pos = new kakao.maps.LatLng(p.lat, p.lng);
        var content = buildContent(p);
        var pinEl = createPinElement(p);

        var overlay = new kakao.maps.CustomOverlay({
          position: pos,
          content: pinEl,
          xAnchor: 0.5,
          yAnchor: 1,
          clickable: true,
          zIndex: Z_BASE
        });
        overlay.setMap(map);

        kakao.maps.event.preventMap(pinEl);

        var item = { overlay: overlay, el: pinEl, point: p, baseZIndex: Z_BASE };
        allMarkers.push(item);
        setMarkerZ(item, Z_BASE, true);

        pinEl.addEventListener('click', function () {
          log('🖱 marker click: ' + p.name);
          activate(pos, p, content);
        });
        pinEl.addEventListener('mouseup', function () {
          log('🖱 marker mouseup: ' + p.name);
          activate(pos, p, content);
        });
        pinEl.addEventListener('touchstart', function (e) {
          e.preventDefault();
          log('📱 marker touchstart: ' + p.name);
          activate(pos, p, content);
        }, { passive: false });

        pinEl.addEventListener('mouseenter', function () {
          setMarkerZ(item, Z_HOVER, false);
        });
        pinEl.addEventListener('mouseleave', function () {
          setMarkerZ(item, item.baseZIndex, false);
        });
      });

      applyMarkerScale();

      updateBrandStats(allMarkers, '전체노선');

      if (query) {
        var hit = null;
        for (var i = 0; i < allMarkers.length; i++) {
          if (allMarkers[i].point.name === query) { hit = allMarkers[i]; break; }
        }
        if (hit) {
          var hitPos = hit.overlay.getPosition();
          map.setLevel(6);
          map.panTo(hitPos);
          activate(hitPos, hit.point, buildContent(hit.point));
        } else {
          log('🔎 검색 결과 없음(완전 일치): "' + query + '"');
        }
      }
    }

    window.addEventListener('message', function (event) {
      if (event.source !== window.parent) {
        return;
      }
      var data = event.data;
      if (!data || data.type !== 'INIT_MAP_DATA') {
        return;
      }
      log('📩 postMessage 데이터 수신 (마커 ' + (data.points ? data.points.length : 0) + '건)');
      if (mapReady) {
        initMap(data.points, data.query);
      } else {
        pendingMapData = data;
      }
    });

    kakao.maps.load(function () {
      var params = new URLSearchParams(window.location.search);
      DEBUG = params.get('debug') === '1';
      if (DEBUG) document.getElementById('debugPanel').style.display = 'block';
      mapReady = true;
      if (pendingMapData) {
        initMap(pendingMapData.points, pendingMapData.query);
        pendingMapData = null;
      }
    });
  </script>
</body>
</html>
