<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    #resetBtn {
      position: absolute; top: 10px; right: 10px; z-index: 100;
      padding: 8px 12px; font-size: 13px; border: none; border-radius: 6px;
      background: #333; color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3);
      cursor: pointer;
    }
    #debugPanel {
      position: absolute; left: 0; bottom: 0; z-index: 100;
      max-height: 35%; width: 100%; overflow-y: auto;
      background: rgba(0,0,0,.8); color: #0f0; font: 12px monospace;
      padding: 6px; display: none; white-space: pre-wrap;
    }
    .highway-label {
      background: #2F5597;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      white-space: nowrap;
      transform: translate(-50%, -130%);
      transition: opacity .2s ease;
    }

    /* 마커 전체 컨테이너: 여기에는 더 이상 scale을 걸지 않습니다. */
    .marker-pin {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      opacity: 1;
      transition: opacity .2s ease;
    }

    /* =========================================================
       [신규] 핀 그래픽(원+꼬리)만 감싸는 내부 래퍼.
       축소(scale)는 오직 이 요소에만 적용됩니다.
       transform-origin을 하단 중앙으로 두어, 축소해도 꼬리 끝(좌표 지점)은
       움직이지 않고 그 자리를 기준으로 작아집니다.
       ========================================================= */
    .pin-graphics {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: 50% 100%;
      transition: transform .2s ease;
    }

    .marker-pin .pin-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      border: 3px solid #ffffff;
      box-shadow: 0 3px 8px rgba(0,0,0,.35);
      box-sizing: border-box;
    }
    .marker-pin .pin-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .marker-pin .pin-tail {
      width: 0;
      height: 0;
      margin-top: -3px;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid #ffffff;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.3));
      pointer-events: none;
    }
    .marker-pin.is-dim { opacity: 0.3; }

    /* [변경] 축소를 .marker-pin 전체가 아니라 내부의 .pin-graphics 에만 적용.
       → 형제 요소인 툴팁(.pin-tooltip)은 축소의 영향을 전혀 받지 않습니다. */
    .marker-pin.is-small .pin-graphics { transform: scale(0.55); }

    /* =========================================================
       호버 툴팁: 핀의 자식이지만 .pin-graphics 바깥(형제)에 위치.
       순수 CSS :hover 로만 표시되어 깜빡임이 없고,
       핀 그래픽이 축소돼도 크기가 고정됩니다.
       ========================================================= */
    .pin-tooltip {
      position: absolute;
      bottom: 100%;              /* 핀 위쪽에 배치 */
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;      /* 툴팁은 항상 마우스를 통과시킴 → 깜빡임 방지 */
      transition: opacity .12s ease;
      z-index: 30;
    }
    .pin-tooltip b { font-size: 13px; }
    .marker-pin:hover .pin-tooltip {
      opacity: 1;
      visibility: visible;
    }

    /* 클릭 시 뜨는 세부 정보창(카카오 InfoWindow) - 기존 그대로 유지 */
    .iw-wrap {
      pointer-events: none;
      position: relative;
      margin-bottom: 34px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      min-width: 180px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
    }
    .iw-close {
      pointer-events: auto;
      position: absolute;
      top: 6px;
      right: 8px;
      width: 20px;
      height: 20px;
      line-height: 20px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      border-radius: 50%;
    }
    .iw-close:hover { background: #eee; color: #333; }
    .iw-title { font-size: 14px; font-weight: 700; padding-right: 18px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="resetBtn">전체 보기</button>
  <div id="debugPanel"></div>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fbd1e96068b754f1939c7e11a2790ce1&autoload=false"></script>
  <script>
    var HIGHWAY_ROUTES = {
      "평택영월고속도로": [
        [37.04865840817568, 126.91955476593384],
        [37.04607817131007, 126.94572715718608],
        [37.0313455713912, 126.97158756314981],
        [37.0249688329813, 127.01096844170729],
        [37.02561344138778, 127.03331017977634],
        [37.03490397784772, 127.1081700982303],
        [37.03412411628573, 127.1603202617985],
        [36.97484657484367, 127.31544979850715]
      ],
      "중부내륙고속도로": [
        [35.1000, 128.4500],
        [35.5000, 128.2000],
        [36.0000, 128.0000],
        [36.6000, 127.9000],
        [37.2000, 127.8000]
      ]
    };
    var BRAND_IMAGES = {
      "GS25": "images/GS25.PNG",
      "CU": "images/CU.PNG",
      "7-11": "images/7-11.PNG",
      "이마트24": "images/emart24.PNG",
      "기타": "images/ect.PNG"
    };
    function resolveBrandImage(brand) {
      if (brand === "세븐일레븐") return BRAND_IMAGES["7-11"];
      if (BRAND_IMAGES[brand]) return BRAND_IMAGES[brand];
      return BRAND_IMAGES["기타"];
    }

    // 브랜드명 → 테두리/꼬리 색상 반환 (매칭 실패 시 '기타' 색상으로 폴백)
    var BRAND_COLORS = {
      "GS25": "#2770BF",
      "CU": "#710E82",
      "세븐일레븐": "#FF6C00",
      "7-11": "#FF6C00",
      "이마트24": "#FFC000",
      "기타": "#BFBFBF"
    };
    function resolveBrandColor(brand) {
      if (BRAND_COLORS[brand]) return BRAND_COLORS[brand];
      return BRAND_COLORS["기타"];
    }

    var SMALL_MARKER_ZOOM_LEVEL = 10;
    var map, currentPolyline = null, currentLabel = null, infowindow = null, allMarkers = [];
    var activeRoutePath = null, activeRouteName = "";
    var DEBUG = false;
    var mapReady = false;
    var pendingMapData = null;
    window.closeInfoWindow = function () {
      if (infowindow) infowindow.close();
    };
    function log(msg) {
      if (!DEBUG) return;
      var el = document.getElementById('debugPanel');
      el.textContent += msg + "\n";
      el.scrollTop = el.scrollHeight;
    }
    function normalize(s) {
      return (s == null ? "" : String(s)).replace(/\s+/g, "").trim();
    }
    var ROUTE_LOOKUP = {};
    (function () {
      for (var k in HIGHWAY_ROUTES) {
        if (HIGHWAY_ROUTES.hasOwnProperty(k)) ROUTE_LOOKUP[normalize(k)] = { name: k, path: HIGHWAY_ROUTES[k] };
      }
    })();
    // 클릭 시 뜨는 세부 정보창 내용 (기존과 동일)
    function buildContent(p) {
      return '<div class="iw-wrap">' +
               '<span class="iw-close" onclick="closeInfoWindow()">×</span>' +
               '<div class="iw-title">' + p.name + '</div>' +
               '연매출액: ' + p.revenue + '<br>' +
               '브랜드: ' + p.brand + '<br>' +
               '운영사: ' + p.operator + '<br>' +
               '계약기간: ' + p.contract + '<br>' +
               '계약차수: ' + (p.contract_step != null ? p.contract_step : '') + '<br>' +
               '담당자: ' + p.manager +
             '</div>';
    }
    // 호버 시 보여줄 간단 툴팁 내용
    function buildTooltipContent(p) {
      return '<b>' + p.name + '</b><br>' +
             '브랜드: ' + p.brand + '<br>' +
             '연매출액: ' + p.revenue;
    }
    function createPinElement(p) {
      var wrap = document.createElement('div');
      wrap.className = 'marker-pin';

      // [핵심] 축소의 영향을 받지 않아야 하는 툴팁은 .pin-graphics '바깥'(형제)에 둡니다.
      var tooltip = document.createElement('div');
      tooltip.className = 'pin-tooltip';
      tooltip.innerHTML = buildTooltipContent(p);

      // [신규] 핀 그래픽(원+꼬리)만 감싸는 래퍼. 축소는 이 요소에만 적용됩니다.
      var graphics = document.createElement('div');
      graphics.className = 'pin-graphics';

      var circle = document.createElement('div');
      circle.className = 'pin-circle';
      circle.style.borderColor = resolveBrandColor(p.brand);   // 브랜드별 원 테두리 색상

      var img = document.createElement('img');
      img.src = resolveBrandImage(p.brand);
      img.alt = p.brand || '';
      circle.appendChild(img);

      var tail = document.createElement('div');
      tail.className = 'pin-tail';
      tail.style.borderTopColor = resolveBrandColor(p.brand);  // 브랜드별 꼬리 색상

      graphics.appendChild(circle);
      graphics.appendChild(tail);

      // 최종 구조: .marker-pin > [ .pin-tooltip(형제), .pin-graphics > (.pin-circle, .pin-tail) ]
      wrap.appendChild(tooltip);
      wrap.appendChild(graphics);
      return wrap;
    }
    function clearRoute() {
      if (currentPolyline) { currentPolyline.setMap(null); currentPolyline = null; }
      if (currentLabel) { currentLabel.setMap(null); currentLabel = null; }
      activeRoutePath = null;
      activeRouteName = "";
    }
    function drawRoute(highway) {
      clearRoute();
      var entry = ROUTE_LOOKUP[normalize(highway)];
      if (!entry) {
        log('❌ 노선 좌표 없음: "' + highway + '"');
        return;
      }
      log('✅ 노선 그림: "' + highway + '" (' + entry.path.length + '개 좌표)');
      var path = entry.path.map(function (c) { return new kakao.maps.LatLng(c[0], c[1]); });
      currentPolyline = new kakao.maps.Polyline({
        path: path,
        strokeWeight: 4,
        strokeColor: '#2F5597',
        strokeOpacity: 0.9,
        strokeStyle: 'solid'
      });
      currentPolyline.setMap(map);
      activeRoutePath = path;
      activeRouteName = entry.name;
      currentLabel = new kakao.maps.CustomOverlay({
        position: path[Math.floor(path.length / 2)],
        content: '<div class="highway-label">' + entry.name + '</div>',
        yAnchor: 1,
        zIndex: 15
      });
      currentLabel.setMap(map);
      updateLabelPosition();
    }
    function updateLabelPosition() {
      if (!currentLabel || !activeRoutePath || !activeRoutePath.length) return;
      var bounds = map.getBounds();
      var center = map.getCenter();
      var cLat = center.getLat(), cLng = center.getLng();
      var best = null, bestDist = Infinity;
      for (var i = 0; i < activeRoutePath.length; i++) {
        var pt = activeRoutePath[i];
        if (!bounds.contain(pt)) continue;
        var dLat = pt.getLat() - cLat;
        var dLng = pt.getLng() - cLng;
        var dist = dLat * dLat + dLng * dLng;
        if (dist < bestDist) { bestDist = dist; best = pt; }
      }
      if (best) {
        currentLabel.setPosition(best);
        currentLabel.setMap(map);
      } else {
        currentLabel.setMap(null);
      }
    }
    function highlightMarkers(highway) {
      var target = normalize(highway);
      allMarkers.forEach(function (item) {
        var el = item.el;
        if (normalize(item.point.highway) === target) {
          el.classList.remove('is-dim');
          el.style.zIndex = 10;
        } else {
          el.classList.add('is-dim');
          el.style.zIndex = 1;
        }
      });
    }
    function resetAll() {
      clearRoute();
      if (infowindow) infowindow.close();
      allMarkers.forEach(function (item) {
        item.el.classList.remove('is-dim');
        item.el.style.zIndex = 2;
      });
      log('↺ 전체 초기화');
    }
    function selectHighway(p) {
      log('👉 selectHighway 실행: ' + p.name + ' / highway=' + p.highway);
      drawRoute(p.highway);
      highlightMarkers(p.highway);
    }
    function activate(pos, p, content) {
      infowindow.setContent(content);
      infowindow.setPosition(pos);
      infowindow.open(map);
      selectHighway(p);
    }
    function applyMarkerScale() {
      if (!map) return;
      var level = map.getLevel();
      var small = level >= SMALL_MARKER_ZOOM_LEVEL;
      allMarkers.forEach(function (item) {
        if (small) {
          item.el.classList.add('is-small');
        } else {
          item.el.classList.remove('is-small');
        }
      });
    }
    function initMap(points, query) {
      log('총 마커 수: ' + (points ? points.length : 0));
      var container = document.getElementById('map');
      if (!map) {
        var center = (points && points.length)
          ? new kakao.maps.LatLng(points[0].lat, points[0].lng)
          : new kakao.maps.LatLng(36.5, 127.8);
        map = new kakao.maps.Map(container, { center: center, level: 8 });
        infowindow = new kakao.maps.InfoWindow({ zIndex: 20 });
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        kakao.maps.event.addListener(map, 'idle', updateLabelPosition);
        kakao.maps.event.addListener(map, 'zoom_changed', applyMarkerScale);
      } else {
        allMarkers.forEach(function (item) { item.overlay.setMap(null); });
        allMarkers = [];
        resetAll();
      }
      (points || []).forEach(function (p) {
        var pos = new kakao.maps.LatLng(p.lat, p.lng);
        var content = buildContent(p);
        var pinEl = createPinElement(p);
        pinEl.style.zIndex = 2;
        var overlay = new kakao.maps.CustomOverlay({
          position: pos,
          content: pinEl,
          xAnchor: 0.5,
          yAnchor: 1,
          clickable: true
        });
        overlay.setMap(map);
        kakao.maps.event.preventMap(pinEl);
        allMarkers.push({ overlay: overlay, el: pinEl, point: p });
        // 호버 미리보기는 순수 CSS 툴팁(.pin-tooltip)이 전담 → 깜빡임 없음
        pinEl.addEventListener('click', function () {
          log('🖱 marker click: ' + p.name);
          activate(pos, p, content);
        });
        pinEl.addEventListener('mouseup', function () {
          log('🖱 marker mouseup: ' + p.name);
          activate(pos, p, content);
        });
        pinEl.addEventListener('touchstart', function (e) {
          e.preventDefault();
          log('📱 marker touchstart: ' + p.name);
          activate(pos, p, content);
        }, { passive: false });
      });
      applyMarkerScale();
      if (query) {
        var hit = null;
        for (var i = 0; i < allMarkers.length; i++) {
          if (allMarkers[i].point.name === query) { hit = allMarkers[i]; break; }
        }
        if (hit) {
          var hitPos = hit.overlay.getPosition();
          map.setLevel(6);
          map.panTo(hitPos);
          activate(hitPos, hit.point, buildContent(hit.point));
        } else {
          log('🔎 검색 결과 없음(완전 일치): "' + query + '"');
        }
      }
    }
    window.addEventListener('message', function (event) {
      if (event.source !== window.parent) {
        return;
      }
      var data = event.data;
      if (!data || data.type !== 'INIT_MAP_DATA') {
        return;
      }
      log('📩 postMessage 데이터 수신 (마커 ' + (data.points ? data.points.length : 0) + '건)');
      if (mapReady) {
        initMap(data.points, data.query);
      } else {
        pendingMapData = data;
      }
    });
    kakao.maps.load(function () {
      var params = new URLSearchParams(window.location.search);
      DEBUG = params.get('debug') === '1';
      if (DEBUG) document.getElementById('debugPanel').style.display = 'block';
      mapReady = true;
      if (pendingMapData) {
        initMap(pendingMapData.points, pendingMapData.query);
        pendingMapData = null;
      }
    });
  </script>
</body>
</html>
