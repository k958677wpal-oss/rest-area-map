<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }

    .top-right-btns {
      position: absolute; top: 10px; right: 10px; z-index: 100;
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .map-btn {
      padding: 8px 12px; font-size: 13px; border: none; border-radius: 6px;
      color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: pointer;
      white-space: nowrap;
    }
    #resetBtn { background: #333; }
    #showAllRoutesBtn { background: #2F5597; }

    /* 좌측 필터 영역 */
    #leftPanels {
      position: absolute; top: 10px; left: 10px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      width: max-content;
      max-width: calc(100% - 20px);
    }

    /* [신규] 필터 마스터 토글 버튼 */
    #filterMasterBtn {
      padding: 8px 14px; font-size: 13px; font-weight: 700;
      border: none; border-radius: 8px;
      background: #2F5597; color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.25); cursor: pointer;
      white-space: nowrap; width: max-content;
    }
    /* 마스터가 닫혀 있으면 세 필터 묶음을 숨김 */
    #filterGroup { display: flex; flex-direction: column; gap: 8px; }
    #leftPanels.master-collapsed #filterGroup { display: none; }

    /* 공통 패널 카드 */
    .panel-card {
      background: rgba(255,255,255,0.94);
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      overflow: hidden;
      font-size: 12px;
    }
    .panel-head {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.04);
    }
    .panel-titlebox { display: flex; flex-direction: column; }
    .panel-title { font-weight: 700; color: #333; white-space: nowrap; }
    .panel-sub { font-size: 11px; color: #2F5597; font-weight: 600; white-space: nowrap; }
    .panel-toggle {
      margin-left: auto;
      border: none; background: transparent;
      font-size: 13px; color: #555; cursor: pointer; padding: 2px 6px; line-height: 1;
    }
    .panel-card.is-collapsed .panel-body { display: none; }

    /* 브랜드 점유율 본문 */
    #brandStats .bs-body { display: flex; align-items: stretch; }
    #brandStats .bs-cell {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 10px;
      border-left: 1px solid rgba(0,0,0,0.08);
      min-width: 54px;
      cursor: pointer;
      transition: background .15s ease;
    }
    #brandStats .bs-cell:first-child { border-left: none; }
    #brandStats .bs-cell:hover { background: rgba(47,85,151,0.08); }
    #brandStats .bs-cell.is-active { background: rgba(47,85,151,0.16); }
    #brandStats .bs-name { font-weight: 700; margin-bottom: 2px; white-space: nowrap; }
    #brandStats .bs-value { color: #333; white-space: nowrap; }
    #brandStats .bs-GS25 .bs-name { color: #2770BF; }
    #brandStats .bs-CU .bs-name { color: #710E82; }
    #brandStats .bs-emart .bs-name { color: #C99700; }
    #brandStats .bs-seven .bs-name { color: #FF6C00; }
    #brandStats .bs-etc .bs-name { color: #888; }

    /* 칩 영역(계약/운영사 공용) - [변경] 가로 폭 제한 + 자동 줄바꿈 */
    .chip-body { padding: 8px 10px; }
    .chip-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      max-width: 300px;              /* 칩이 3~4개마다 다음 줄로 넘어가도록 */
    }
    .chip-row + .chip-row { margin-top: 6px; }
    .flt-chip {
      padding: 5px 10px; border-radius: 14px; font-size: 12px; font-weight: 600;
      background: #eee; color: #333; cursor: pointer; white-space: nowrap;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .flt-chip:hover { background: #e0e6f0; }
    .flt-chip.is-active { background: #2F5597; color: #fff; border-color: #2F5597; }
    .flt-empty-note { font-size: 11px; color: #999; padding: 2px 2px; }
    .etc-scroll {
      margin-top: 6px;
      max-height: 150px;
      overflow-y: auto;
      display: flex; flex-wrap: wrap; gap: 6px;
      max-width: 300px;
      padding-top: 6px;
      border-top: 1px dashed rgba(0,0,0,0.12);
    }

    @media (max-width: 768px) {
      #brandStats .bs-body {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0;
      }
      #brandStats .bs-cell {
        border-left: none;
        border-top: 1px solid rgba(0,0,0,0.08);
        min-width: 0;
        padding: 6px 4px;
      }
      .chip-row, .etc-scroll { max-width: 240px; }
    }

    #debugPanel {
      position: absolute; left: 0; bottom: 0; z-index: 100;
      max-height: 35%; width: 100%; overflow-y: auto;
      background: rgba(0,0,0,.8); color: #0f0; font: 12px monospace;
      padding: 6px; display: none; white-space: pre-wrap;
    }
    .highway-label {
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      white-space: nowrap;
      transform: translate(-50%, -130%);
    }

    .name-label {
      transform: translateY(-56px);
      background: rgba(33,33,33,0.85);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 6px;
      white-space: nowrap;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }

    .marker-pin {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      opacity: 1;
      transition: opacity .2s ease;
    }
    .pin-graphics {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: 50% 100%;
      transition: transform .2s ease;
    }
    .marker-pin .pin-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      border: 3px solid #ffffff;
      box-shadow: 0 3px 8px rgba(0,0,0,.35);
      box-sizing: border-box;
    }
    .marker-pin .pin-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .marker-pin .pin-tail {
      width: 0;
      height: 0;
      margin-top: -3px;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid #ffffff;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.3));
      pointer-events: none;
    }
    .marker-pin.is-dim { opacity: 0.3; }
    .marker-pin.is-small .pin-graphics { transform: scale(0.55); }

    .pin-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .12s ease;
      z-index: 30;
    }
    .pin-tooltip b { font-size: 13px; }
    .marker-pin:hover .pin-tooltip {
      opacity: 1;
      visibility: visible;
    }

    .iw-wrap {
      pointer-events: none;
      position: relative;
      margin-bottom: 34px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      min-width: 180px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
    }
    .iw-close {
      pointer-events: auto;
      position: absolute;
      top: 6px;
      right: 8px;
      width: 20px;
      height: 20px;
      line-height: 20px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      border-radius: 50%;
    }
    .iw-close:hover { background: #eee; color: #333; }
    .iw-title { font-size: 14px; font-weight: 700; padding-right: 18px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- 좌측: 마스터 버튼 + (열렸을 때) 세 필터 묶음 -->
  <div id="leftPanels" class="master-collapsed">
    <button id="filterMasterBtn">🔎 필터 열기</button>
    <div id="filterGroup">
      <div id="brandStats" class="panel-card is-collapsed"></div>
      <div id="contractFilterPanel" class="panel-card is-collapsed"></div>
      <div id="operatorFilterPanel" class="panel-card is-collapsed"></div>
    </div>
  </div>

  <div class="top-right-btns">
    <button id="resetBtn" class="map-btn">전체 보기</button>
    <button id="showAllRoutesBtn" class="map-btn">전체 노선 보기</button>
  </div>

  <div id="debugPanel"></div>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fbd1e96068b754f1939c7e11a2790ce1&autoload=false"></script>
  <script>
    var BRAND_IMAGES = {
      "GS25": "images/GS25.PNG",
      "CU": "images/CU.PNG",
      "7-11": "images/7-11.PNG",
      "이마트24": "images/emart24.PNG",
      "기타": "images/ect.PNG"
    };
    function resolveBrandImage(brand) {
      if (brand === "세븐일레븐") return BRAND_IMAGES["7-11"];
      if (BRAND_IMAGES[brand]) return BRAND_IMAGES[brand];
      return BRAND_IMAGES["기타"];
    }

    var BRAND_COLORS = {
      "GS25": "#2770BF",
      "CU": "#710E82",
      "세븐일레븐": "#FF6C00",
      "7-11": "#FF6C00",
      "이마트24": "#FFC000",
      "기타": "#BFBFBF"
    };
    function resolveBrandColor(brand) {
      if (BRAND_COLORS[brand]) return BRAND_COLORS[brand];
      return BRAND_COLORS["기타"];
    }

    var ROUTE_COLOR_PALETTE = [
      "#E6194B", "#3CB44B", "#4363D8", "#F58231", "#911EB4",
      "#008080", "#9A6324", "#800000", "#808000", "#000075",
      "#E6799A", "#46F0F0", "#F032E6", "#BCBD22", "#17BECF",
      "#D2691E", "#1F77B4", "#2CA02C", "#8C564B", "#E377C2"
    ];
    function getRouteColor(highway) {
      var s = String(highway || "");
      var hash = 0;
      for (var i = 0; i < s.length; i++) {
        hash = (hash * 31 + s.charCodeAt(i)) % 1000000007;
      }
      var idx = Math.abs(hash) % ROUTE_COLOR_PALETTE.length;
      return ROUTE_COLOR_PALETTE[idx];
    }

    var BRAND_STAT_ORDER = [
      { key: "GS25",   label: "GS25",   cls: "bs-GS25" },
      { key: "CU",     label: "CU",     cls: "bs-CU" },
      { key: "이마트24", label: "이마트24", cls: "bs-emart" },
      { key: "7-11",   label: "7-11",   cls: "bs-seven" },
      { key: "매점",    label: "매점",    cls: "bs-etc" }
    ];

    function classifyBrand(brand) {
      var b = (brand == null ? "" : String(brand)).trim();
      if (b === "GS25") return "GS25";
      if (b === "CU") return "CU";
      if (b === "이마트24") return "이마트24";
      if (b === "세븐일레븐" || b === "7-11") return "7-11";
      return "매점";
    }

    function brandLabelText(key) {
      for (var i = 0; i < BRAND_STAT_ORDER.length; i++) {
        if (BRAND_STAT_ORDER[i].key === key) return BRAND_STAT_ORDER[i].label;
      }
      return key;
    }

    var brandStatsCollapsed = true;

    function updateBrandStats(markers, routeLabel) {
      var counts = { "GS25": 0, "CU": 0, "이마트24": 0, "7-11": 0, "매점": 0 };
      var total = 0;
      (markers || []).forEach(function (item) {
        counts[classifyBrand(item.point.brand)] += 1;
        total += 1;
      });

      var cellsHtml = "";
      BRAND_STAT_ORDER.forEach(function (b) {
        var cnt = counts[b.key];
        var pct = (total > 0) ? Math.round((cnt / total) * 100) : 0;
        var activeCls = (filterMode === 'brand' && activeBrandKey === b.key) ? ' is-active' : '';
        cellsHtml += '<div class="bs-cell ' + b.cls + activeCls + '" data-brand="' + b.key + '">' +
                       '<span class="bs-name">' + b.label + '</span>' +
                       '<span class="bs-value">' + cnt + '(' + pct + '%)</span>' +
                     '</div>';
      });

      var arrow = brandStatsCollapsed ? '▼' : '▲';
      var html =
        '<div class="panel-head">' +
          '<div class="panel-titlebox">' +
            '<span class="panel-title">브랜드 점유율</span>' +
            '<span class="panel-sub">(' + (routeLabel || '전체노선') + ')</span>' +
          '</div>' +
          '<button class="panel-toggle" id="bsToggle">' + arrow + '</button>' +
        '</div>' +
        // [수정] 본문에 panel-body 클래스 추가 → 접기 규칙 적용됨
        '<div class="panel-body bs-body">' + cellsHtml + '</div>';

      var container = document.getElementById('brandStats');
      container.innerHTML = html;
      container.classList.toggle('is-collapsed', brandStatsCollapsed);

      var toggleBtn = document.getElementById('bsToggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          brandStatsCollapsed = !brandStatsCollapsed;
          container.classList.toggle('is-collapsed', brandStatsCollapsed);
          toggleBtn.textContent = brandStatsCollapsed ? '▼' : '▲';
        });
      }

      var cells = container.querySelectorAll('.bs-cell');
      for (var c = 0; c < cells.length; c++) {
        cells[c].addEventListener('click', function () {
          filterByBrand(this.getAttribute('data-brand'));
        });
      }
    }

    // ===== 계약만료 필터 =====
    function parseContractYear(contractStr) {
      var s = (contractStr == null ? "" : String(contractStr)).trim();
      if (!s) return null;
      var m4 = s.match(/(20\d{2})/);
      if (m4) return parseInt(m4[1], 10);
      var m2 = s.match(/^(\d{2})\./);
      if (m2) return 2000 + parseInt(m2[1], 10);
      return null;
    }
    var CONTRACT_YEARS = [2026, 2027, 2028, 2029];
    var contractPanelCollapsed = true;
    var contractFilterState = null;

    function updateContractPanel() {
      var yearCounts = {};
      CONTRACT_YEARS.forEach(function (y) { yearCounts[y] = 0; });
      allMarkers.forEach(function (item) {
        var y = parseContractYear(item.point.contract);
        if (y != null && yearCounts.hasOwnProperty(y)) yearCounts[y] += 1;
      });

      var yearChipsHtml = "";
      CONTRACT_YEARS.forEach(function (y) {
        var active = (contractFilterState && contractFilterState.year === y) ? ' is-active' : '';
        yearChipsHtml += '<div class="flt-chip' + active + '" data-year="' + y + '">' + y + '년(' + yearCounts[y] + ')</div>';
      });

      var stepChipsHtml = "";
      if (contractFilterState && contractFilterState.year != null) {
        var stepSet = {}, stepList = [];
        allMarkers.forEach(function (item) {
          if (parseContractYear(item.point.contract) !== contractFilterState.year) return;
          var sv = (item.point.contract_step == null ? "" : String(item.point.contract_step)).trim();
          if (!sv) return;
          if (!stepSet[sv]) { stepSet[sv] = true; stepList.push(sv); }
        });
        if (stepList.length) {
          var allActive = (contractFilterState.step == null) ? ' is-active' : '';
          stepChipsHtml += '<div class="flt-chip' + allActive + '" data-step="__ALL__">전체</div>';
          stepList.forEach(function (sv) {
            var active = (contractFilterState.step === sv) ? ' is-active' : '';
            stepChipsHtml += '<div class="flt-chip' + active + '" data-step="' + sv + '">' + sv + '</div>';
          });
        } else {
          stepChipsHtml = '<div class="flt-empty-note">이 연도에는 계약차수 정보가 없습니다.</div>';
        }
      }

      var arrow = contractPanelCollapsed ? '▼' : '▲';
      var sub = contractFilterState ? (' (' + contractFilterState.year + '년' + (contractFilterState.step ? ' · ' + contractFilterState.step : '') + ')') : '';

      var html =
        '<div class="panel-head">' +
          '<div class="panel-titlebox">' +
            '<span class="panel-title">📅 계약만료 필터</span>' +
            (sub ? '<span class="panel-sub">' + sub + '</span>' : '') +
          '</div>' +
          '<button class="panel-toggle" id="cfToggle">' + arrow + '</button>' +
        '</div>' +
        '<div class="panel-body chip-body">' +
          '<div class="chip-row">' + yearChipsHtml + '</div>' +
          (stepChipsHtml ? '<div class="chip-row">' + stepChipsHtml + '</div>' : '') +
        '</div>';

      var panel = document.getElementById('contractFilterPanel');
      panel.innerHTML = html;
      panel.classList.toggle('is-collapsed', contractPanelCollapsed);

      var toggleBtn = document.getElementById('cfToggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          contractPanelCollapsed = !contractPanelCollapsed;
          panel.classList.toggle('is-collapsed', contractPanelCollapsed);
          toggleBtn.textContent = contractPanelCollapsed ? '▼' : '▲';
        });
      }

      var yearEls = panel.querySelectorAll('[data-year]');
      for (var i = 0; i < yearEls.length; i++) {
        yearEls[i].addEventListener('click', function () {
          filterByContractYear(parseInt(this.getAttribute('data-year'), 10));
        });
      }
      var stepEls = panel.querySelectorAll('[data-step]');
      for (var j = 0; j < stepEls.length; j++) {
        stepEls[j].addEventListener('click', function () {
          var sv = this.getAttribute('data-step');
          filterByContractStep(sv === '__ALL__' ? null : sv);
        });
      }
    }

    // ===== 운영사 필터 =====
    var TOP_OPERATOR_COUNT = 10;
    var operatorPanelCollapsed = true;
    var operatorEtcExpanded = false;
    var activeOperator = null;

    function normalizeOperator(v) {
      return (v == null ? "" : String(v)).trim();
    }

    function getOperatorCounts() {
      var counts = {};
      allMarkers.forEach(function (item) {
        var op = normalizeOperator(item.point.operator);
        if (!op) return;
        counts[op] = (counts[op] || 0) + 1;
      });
      var arr = [];
      for (var k in counts) {
        if (counts.hasOwnProperty(k)) arr.push({ name: k, count: counts[k] });
      }
      arr.sort(function (a, b) { return b.count - a.count; });
      return arr;
    }

    function updateOperatorPanel() {
      var opCounts = getOperatorCounts();
      var topOps = opCounts.slice(0, TOP_OPERATOR_COUNT);
      var etcOps = opCounts.slice(TOP_OPERATOR_COUNT);
      var etcTotal = etcOps.reduce(function (a, b) { return a + b.count; }, 0);

      var topChipsHtml = "";
      topOps.forEach(function (o) {
        var active = (activeOperator === o.name) ? ' is-active' : '';
        topChipsHtml += '<div class="flt-chip' + active + '" data-operator="' + o.name + '">' + o.name + '(' + o.count + ')</div>';
      });
      if (etcOps.length) {
        var etcActive = operatorEtcExpanded ? ' is-active' : '';
        topChipsHtml += '<div class="flt-chip' + etcActive + '" data-etc="1">그외 ' + etcOps.length + '곳(' + etcTotal + ') ' + (operatorEtcExpanded ? '▲' : '▾') + '</div>';
      }

      var etcListHtml = "";
      if (operatorEtcExpanded && etcOps.length) {
        etcListHtml = '<div class="etc-scroll">';
        etcOps.forEach(function (o) {
          var active = (activeOperator === o.name) ? ' is-active' : '';
          etcListHtml += '<div class="flt-chip' + active + '" data-operator="' + o.name + '">' + o.name + '(' + o.count + ')</div>';
        });
        etcListHtml += '</div>';
      }

      var arrow = operatorPanelCollapsed ? '▼' : '▲';
      var sub = activeOperator ? (' (' + activeOperator + ')') : '';

      var html =
        '<div class="panel-head">' +
          '<div class="panel-titlebox">' +
            '<span class="panel-title">🏢 운영사 필터</span>' +
            (sub ? '<span class="panel-sub">' + sub + '</span>' : '') +
          '</div>' +
          '<button class="panel-toggle" id="opToggle">' + arrow + '</button>' +
        '</div>' +
        '<div class="panel-body chip-body">' +
          '<div class="chip-row">' + topChipsHtml + '</div>' +
          etcListHtml +
        '</div>';

      var panel = document.getElementById('operatorFilterPanel');
      panel.innerHTML = html;
      panel.classList.toggle('is-collapsed', operatorPanelCollapsed);

      var toggleBtn = document.getElementById('opToggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          operatorPanelCollapsed = !operatorPanelCollapsed;
          panel.classList.toggle('is-collapsed', operatorPanelCollapsed);
          toggleBtn.textContent = operatorPanelCollapsed ? '▼' : '▲';
        });
      }

      var etcBtn = panel.querySelector('[data-etc]');
      if (etcBtn) {
        etcBtn.addEventListener('click', function () {
          operatorEtcExpanded = !operatorEtcExpanded;
          updateOperatorPanel();
        });
      }

      var opEls = panel.querySelectorAll('[data-operator]');
      for (var i = 0; i < opEls.length; i++) {
        opEls[i].addEventListener('click', function () {
          filterByOperator(this.getAttribute('data-operator'));
        });
      }
    }

    var SMALL_MARKER_ZOOM_LEVEL = 10;
    var LABEL_MAX_ZOOM_LEVEL = 9;
    var NAME_LABEL_MAX_ZOOM_LEVEL = 11;
    var LABEL_MIN_GAP_PX = 70;
    var FILTER_LABEL_THRESHOLD = 25;

    var Z_BASE = 2;
    var Z_HIGHLIGHT = 10;
    var Z_DIM = 1;
    var Z_HOVER = 9999;

    var map, infowindow = null, allMarkers = [];
    var allPolylines = [];
    var allLabels = [];
    var isShowingAllRoutes = false;

    var filterMode = null;
    var activeBrandKey = null;
    var filteredMarkerItems = [];

    var DEBUG = false;
    var mapReady = false;
    var pendingMapData = null;

    window.closeInfoWindow = function () {
      if (infowindow) infowindow.close();
    };

    function log(msg) {
      if (!DEBUG) return;
      var el = document.getElementById('debugPanel');
      el.textContent += msg + "\n";
      el.scrollTop = el.scrollHeight;
    }

    function normalize(s) {
      return (s == null ? "" : String(s)).replace(/\s+/g, "").trim();
    }

    function setMarkerZ(item, z, isBaseChange) {
      item.el.style.zIndex = z;
      item.overlay.setZIndex(z);
      if (isBaseChange) item.baseZIndex = z;
    }

    function buildTitle(p) {
      var hw = (p.highway == null ? "" : String(p.highway)).trim();
      if (hw !== "") return p.name + '(' + hw + ')';
      return p.name;
    }

    function buildContent(p) {
      return '<div class="iw-wrap">' +
               '<span class="iw-close" onclick="closeInfoWindow()">×</span>' +
               '<div class="iw-title">' + buildTitle(p) + '</div>' +
               '연매출액: ' + p.revenue + '<br>' +
               '브랜드: ' + p.brand + '<br>' +
               '운영사: ' + p.operator + '<br>' +
               '계약기간: ' + p.contract + '<br>' +
               '계약차수: ' + (p.contract_step != null ? p.contract_step : '') + '<br>' +
               '담당자: ' + p.manager +
             '</div>';
    }

    function buildTooltipContent(p) {
      return '<b>' + buildTitle(p) + '</b><br>' +
             '브랜드: ' + p.brand + '<br>' +
             '연매출액: ' + p.revenue;
    }

    function createPinElement(p) {
      var wrap = document.createElement('div');
      wrap.className = 'marker-pin';

      var tooltip = document.createElement('div');
      tooltip.className = 'pin-tooltip';
      tooltip.innerHTML = buildTooltipContent(p);

      var graphics = document.createElement('div');
      graphics.className = 'pin-graphics';

      var circle = document.createElement('div');
      circle.className = 'pin-circle';
      circle.style.borderColor = resolveBrandColor(p.brand);

      var img = document.createElement('img');
      img.src = resolveBrandImage(p.brand);
      img.alt = p.brand || '';
      circle.appendChild(img);

      var tail = document.createElement('div');
      tail.className = 'pin-tail';
      tail.style.borderTopColor = resolveBrandColor(p.brand);

      graphics.appendChild(circle);
      graphics.appendChild(tail);

      wrap.appendChild(tooltip);
      wrap.appendChild(graphics);
      return wrap;
    }

    function clearRoute() {
      allPolylines.forEach(function (pl) { pl.setMap(null); });
      allLabels.forEach(function (lb) { lb.overlay.setMap(null); });
      allPolylines = [];
      allLabels = [];
    }

    function squaredDistance(a, b) {
      var dLat = a.lat - b.lat;
      var dLng = a.lng - b.lng;
      return dLat * dLat + dLng * dLng;
    }

    function computeSortedGroup(highway) {
      var target = normalize(highway);
      var group = allMarkers.filter(function (item) {
        return normalize(item.point.highway) === target;
      });
      if (group.length < 2) return group;

      var farA = 0, farB = 1, maxDist = -1;
      for (var i = 0; i < group.length; i++) {
        for (var k = i + 1; k < group.length; k++) {
          var d = squaredDistance(group[i].point, group[k].point);
          if (d > maxDist) { maxDist = d; farA = i; farB = k; }
        }
      }

      var remaining = group.slice();
      var sorted = [];
      var current = remaining.splice(farA, 1)[0];
      sorted.push(current);

      while (remaining.length > 0) {
        var nearestIdx = 0;
        var nearestDist = squaredDistance(current.point, remaining[0].point);
        for (var j = 1; j < remaining.length; j++) {
          var dd = squaredDistance(current.point, remaining[j].point);
          if (dd < nearestDist) { nearestDist = dd; nearestIdx = j; }
        }
        current = remaining.splice(nearestIdx, 1)[0];
        sorted.push(current);
      }
      return sorted;
    }

    function drawSingleRoute(highway) {
      var group = computeSortedGroup(highway);
      if (group.length < 2) return;

      var color = getRouteColor(highway);
      var path = group.map(function (item) {
        return new kakao.maps.LatLng(item.point.lat, item.point.lng);
      });

      var polyline = new kakao.maps.Polyline({
        path: path, strokeWeight: 4, strokeColor: color,
        strokeOpacity: 0.9, strokeStyle: 'solid'
      });
      polyline.setMap(map);
      allPolylines.push(polyline);

      var labelOverlay = new kakao.maps.CustomOverlay({
        position: path[Math.floor(path.length / 2)],
        content: '<div class="highway-label" style="background:' + color + ';">' + highway + '</div>',
        yAnchor: 1, zIndex: 15
      });
      allLabels.push({ overlay: labelOverlay, path: path, color: color });
    }

    function drawRoute(highway) {
      clearRoute();
      if (!normalize(highway)) return;
      drawSingleRoute(highway);
      updateLabelPosition();
    }

    function showAllRoutes() {
      clearRoute();
      if (infowindow) infowindow.close();
      isShowingAllRoutes = true;
      clearMarkerFilter();

      allMarkers.forEach(function (item) {
        item.el.classList.remove('is-dim');
        setMarkerZ(item, Z_BASE, true);
      });

      var seen = {}, highways = [];
      allMarkers.forEach(function (item) {
        var hw = item.point.highway;
        var key = normalize(hw);
        if (key && !seen[key]) { seen[key] = true; highways.push(hw); }
      });

      highways.forEach(function (hw) { drawSingleRoute(hw); });
      updateLabelPosition();
      updateBrandStats(allMarkers, '전체노선');
    }

    function updateLabelPosition() {
      if (!map || !allLabels.length) return;

      if (isShowingAllRoutes && map.getLevel() > LABEL_MAX_ZOOM_LEVEL) {
        allLabels.forEach(function (lb) { lb.overlay.setMap(null); });
        return;
      }

      var bounds = map.getBounds();
      var center = map.getCenter();
      var cLat = center.getLat(), cLng = center.getLng();

      var projection = null;
      try { projection = map.getProjection(); } catch (e) { projection = null; }
      var placedPoints = [];

      allLabels.forEach(function (lb) {
        var path = lb.path;
        var best = null, bestDist = Infinity;
        for (var i = 0; i < path.length; i++) {
          var pt = path[i];
          if (!bounds.contain(pt)) continue;
          var dLat = pt.getLat() - cLat;
          var dLng = pt.getLng() - cLng;
          var dist = dLat * dLat + dLng * dLng;
          if (dist < bestDist) { bestDist = dist; best = pt; }
        }
        if (!best) { lb.overlay.setMap(null); return; }

        var tooClose = false;
        if (projection) {
          try {
            var cp = projection.containerPointFromCoords(best);
            for (var j = 0; j < placedPoints.length; j++) {
              var dx = cp.x - placedPoints[j].x;
              var dy = cp.y - placedPoints[j].y;
              if (Math.sqrt(dx * dx + dy * dy) < LABEL_MIN_GAP_PX) { tooClose = true; break; }
            }
            if (!tooClose) placedPoints.push(cp);
          } catch (e) { tooClose = false; }
        }

        if (tooClose) { lb.overlay.setMap(null); }
        else { lb.overlay.setPosition(best); lb.overlay.setMap(map); }
      });
    }

    function updateFilteredNameLabels() {
      if (!map) return;

      if (!filterMode) {
        allMarkers.forEach(function (item) {
          if (item.nameLabel) item.nameLabel.setMap(null);
        });
        return;
      }

      var alwaysShow = filteredMarkerItems.length <= FILTER_LABEL_THRESHOLD;
      if (!alwaysShow && map.getLevel() > NAME_LABEL_MAX_ZOOM_LEVEL) {
        filteredMarkerItems.forEach(function (item) {
          if (item.nameLabel) item.nameLabel.setMap(null);
        });
        return;
      }

      var bounds = map.getBounds();
      var projection = null;
      try { projection = map.getProjection(); } catch (e) { projection = null; }
      var placedPoints = [];

      filteredMarkerItems.forEach(function (item) {
        var pos = item.overlay.getPosition();
        if (!bounds.contain(pos)) {
          if (item.nameLabel) item.nameLabel.setMap(null);
          return;
        }

        var tooClose = false;
        if (projection) {
          try {
            var cp = projection.containerPointFromCoords(pos);
            for (var j = 0; j < placedPoints.length; j++) {
              var dx = cp.x - placedPoints[j].x;
              var dy = cp.y - placedPoints[j].y;
              if (Math.sqrt(dx * dx + dy * dy) < LABEL_MIN_GAP_PX) { tooClose = true; break; }
            }
            if (!tooClose) placedPoints.push(cp);
          } catch (e) { tooClose = false; }
        }

        if (tooClose) {
          if (item.nameLabel) item.nameLabel.setMap(null);
          return;
        }

        if (!item.nameLabel) {
          item.nameLabel = new kakao.maps.CustomOverlay({
            position: pos,
            content: '<div class="name-label">' + item.point.name + '</div>',
            yAnchor: 1, zIndex: 25
          });
        }
        item.nameLabel.setMap(map);
      });
    }

    function refreshOverlays() {
      updateLabelPosition();
      updateFilteredNameLabels();
    }

    function clearMarkerFilter() {
      filterMode = null;
      activeBrandKey = null;
      contractFilterState = null;
      activeOperator = null;
      operatorEtcExpanded = false;
      filteredMarkerItems = [];
      allMarkers.forEach(function (item) {
        item.overlay.setMap(map);
        if (item.nameLabel) item.nameLabel.setMap(null);
      });
      updateContractPanel();
      updateOperatorPanel();
    }

    function applyMarkerFilter(items, statsLabel, mode) {
      filterMode = mode;
      filteredMarkerItems = items;

      var matchSet = {};
      items.forEach(function (item) {
        matchSet[item.point.name + '|' + item.point.lat + '|' + item.point.lng] = true;
      });

      allMarkers.forEach(function (item) {
        var key = item.point.name + '|' + item.point.lat + '|' + item.point.lng;
        if (matchSet[key]) {
          item.el.classList.remove('is-dim');
          setMarkerZ(item, Z_BASE, true);
          item.overlay.setMap(map);
        } else {
          item.overlay.setMap(null);
          if (item.nameLabel) item.nameLabel.setMap(null);
        }
      });

      updateFilteredNameLabels();
      updateBrandStats(items, statsLabel);
    }

    function filterByBrand(brandKey) {
      if (filterMode === 'brand' && activeBrandKey === brandKey) { resetAll(); return; }
      clearRoute();
      if (infowindow) infowindow.close();
      isShowingAllRoutes = false;
      contractFilterState = null;
      activeOperator = null; operatorEtcExpanded = false;
      updateContractPanel(); updateOperatorPanel();
      activeBrandKey = brandKey;

      var items = allMarkers.filter(function (item) {
        return classifyBrand(item.point.brand) === brandKey;
      });
      applyMarkerFilter(items, brandLabelText(brandKey) + ' 필터', 'brand');
    }

    function filterByContractYear(year) {
      if (contractFilterState && contractFilterState.year === year && contractFilterState.step == null) { resetAll(); return; }
      clearRoute();
      if (infowindow) infowindow.close();
      isShowingAllRoutes = false;
      activeBrandKey = null;
      activeOperator = null; operatorEtcExpanded = false;
      updateOperatorPanel();
      contractFilterState = { year: year, step: null };
      updateContractPanel();

      var items = allMarkers.filter(function (item) {
        return parseContractYear(item.point.contract) === year;
      });
      applyMarkerFilter(items, year + '년 만료', 'contract');
    }

    function filterByContractStep(step) {
      if (!contractFilterState || contractFilterState.year == null) return;
      if (contractFilterState.step === step) step = null;
      contractFilterState = { year: contractFilterState.year, step: step };
      updateContractPanel();

      var year = contractFilterState.year;
      var items = allMarkers.filter(function (item) {
        if (parseContractYear(item.point.contract) !== year) return false;
        if (step == null) return true;
        var sv = (item.point.contract_step == null ? "" : String(item.point.contract_step)).trim();
        return sv === step;
      });
      applyMarkerFilter(items, year + '년 만료' + (step ? (' · ' + step) : ''), 'contract');
    }

    function filterByOperator(opName) {
      if (filterMode === 'operator' && activeOperator === opName) { resetAll(); return; }
      clearRoute();
      if (infowindow) infowindow.close();
      isShowingAllRoutes = false;
      activeBrandKey = null;
      contractFilterState = null;
      updateContractPanel();
      activeOperator = opName;
      updateOperatorPanel();

      var items = allMarkers.filter(function (item) {
        return normalizeOperator(item.point.operator) === opName;
      });
      applyMarkerFilter(items, opName + ' 필터', 'operator');
    }

    function highlightMarkers(highway) {
      var target = normalize(highway);
      allMarkers.forEach(function (item) {
        if (normalize(item.point.highway) === target) {
          item.el.classList.remove('is-dim');
          setMarkerZ(item, Z_HIGHLIGHT, true);
        } else {
          item.el.classList.add('is-dim');
          setMarkerZ(item, Z_DIM, true);
        }
      });
    }

    function resetAll() {
      clearRoute();
      if (infowindow) infowindow.close();
      isShowingAllRoutes = false;
      clearMarkerFilter();
      allMarkers.forEach(function (item) {
        item.el.classList.remove('is-dim');
        setMarkerZ(item, Z_BASE, true);
      });
      updateBrandStats(allMarkers, '전체노선');
    }

    function selectHighway(p) {
      isShowingAllRoutes = false;
      clearMarkerFilter();
      drawRoute(p.highway);
      highlightMarkers(p.highway);

      var target = normalize(p.highway);
      var group = allMarkers.filter(function (item) {
        return normalize(item.point.highway) === target;
      });
      if (group.length && target) updateBrandStats(group, p.highway);
      else updateBrandStats(allMarkers, '전체노선');
    }

    function onMarkerActivate(pos, p, content) {
      if (filterMode) {
        infowindow.setContent(content);
        infowindow.setPosition(pos);
        infowindow.open(map);
      } else {
        activate(pos, p, content);
      }
    }

    function activate(pos, p, content) {
      infowindow.setContent(content);
      infowindow.setPosition(pos);
      infowindow.open(map);
      selectHighway(p);
    }

    function applyMarkerScale() {
      if (!map) return;
      var level = map.getLevel();
      var small = level >= SMALL_MARKER_ZOOM_LEVEL;
      allMarkers.forEach(function (item) {
        if (small) item.el.classList.add('is-small');
        else item.el.classList.remove('is-small');
      });
    }

    function initMap(points, query) {
      log('총 마커 수: ' + (points ? points.length : 0));
      var container = document.getElementById('map');

      if (!map) {
        var center = (points && points.length)
          ? new kakao.maps.LatLng(points[0].lat, points[0].lng)
          : new kakao.maps.LatLng(36.5, 127.8);
        map = new kakao.maps.Map(container, { center: center, level: 8 });
        infowindow = new kakao.maps.InfoWindow({ zIndex: 20000 });
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('showAllRoutesBtn').addEventListener('click', showAllRoutes);
        kakao.maps.event.addListener(map, 'idle', refreshOverlays);
        kakao.maps.event.addListener(map, 'zoom_changed', function () {
          applyMarkerScale();
          refreshOverlays();
        });

        // [신규] 필터 마스터 버튼: 세 필터 묶음 열기/닫기
        var leftPanels = document.getElementById('leftPanels');
        var masterBtn = document.getElementById('filterMasterBtn');
        masterBtn.addEventListener('click', function () {
          var collapsed = leftPanels.classList.toggle('master-collapsed');
          masterBtn.textContent = collapsed ? '🔎 필터 열기' : '✖ 필터 닫기';
        });

        ['leftPanels'].forEach(function (id) {
          var el = document.getElementById(id);
          ['click', 'mousedown', 'touchstart', 'dblclick'].forEach(function (evt) {
            el.addEventListener(evt, function (e) { e.stopPropagation(); });
          });
        });
      } else {
        allMarkers.forEach(function (item) {
          item.overlay.setMap(null);
          if (item.nameLabel) item.nameLabel.setMap(null);
        });
        allMarkers = [];
        resetAll();
      }

      (points || []).forEach(function (p) {
        var pos = new kakao.maps.LatLng(p.lat, p.lng);
        var content = buildContent(p);
        var pinEl = createPinElement(p);

        var overlay = new kakao.maps.CustomOverlay({
          position: pos, content: pinEl,
          xAnchor: 0.5, yAnchor: 1, clickable: true, zIndex: Z_BASE
        });
        overlay.setMap(map);
        kakao.maps.event.preventMap(pinEl);

        var item = { overlay: overlay, el: pinEl, point: p, baseZIndex: Z_BASE, nameLabel: null };
        allMarkers.push(item);
        setMarkerZ(item, Z_BASE, true);

        pinEl.addEventListener('click', function () { onMarkerActivate(pos, p, content); });
        pinEl.addEventListener('mouseup', function () { onMarkerActivate(pos, p, content); });
        pinEl.addEventListener('touchstart', function (e) { e.preventDefault(); onMarkerActivate(pos, p, content); }, { passive: false });
        pinEl.addEventListener('mouseenter', function () { setMarkerZ(item, Z_HOVER, false); });
        pinEl.addEventListener('mouseleave', function () { setMarkerZ(item, item.baseZIndex, false); });
      });

      applyMarkerScale();
      updateBrandStats(allMarkers, '전체노선');
      updateContractPanel();
      updateOperatorPanel();

      if (query) {
        var hit = null;
        for (var i = 0; i < allMarkers.length; i++) {
          if (allMarkers[i].point.name === query) { hit = allMarkers[i]; break; }
        }
        if (hit) {
          var hitPos = hit.overlay.getPosition();
          map.setLevel(6);
          map.panTo(hitPos);
          activate(hitPos, hit.point, buildContent(hit.point));
        }
      }
    }

    window.addEventListener('message', function (event) {
      if (event.source !== window.parent) return;
      var data = event.data;
      if (!data || data.type !== 'INIT_MAP_DATA') return;
      log('📩 postMessage 수신 (' + (data.points ? data.points.length : 0) + '건)');
      if (mapReady) {
        initMap(data.points, data.query);
      } else {
        pendingMapData = data;
      }
    });

    kakao.maps.load(function () {
      var params = new URLSearchParams(window.location.search);
      DEBUG = params.get('debug') === '1';
      if (DEBUG) document.getElementById('debugPanel').style.display = 'block';
      mapReady = true;
      if (pendingMapData) {
        initMap(pendingMapData.points, pendingMapData.query);
        pendingMapData = null;
      }
    });
  </script>
</body>
</html>
