<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fbd1e96068b754f1939c7e11a2790ce1&autoload=false"></script>
  <script>
    /* =========================================================
       [1] 고속도로 전체 노선 좌표 (미리 정의하는 상수)
       ========================================================= */
    var HIGHWAY_ROUTES = {
      "평택영월고속도로": [
        [37.04865840817568, 126.91955476593384],
        [37.04607817131007, 126.94572715718608],
        [37.0313455713912, 126.97158756314981],
        [37.0249688329813, 127.01096844170729],
        [37.02561344138778, 127.03331017977634],
        [37.03490397784772, 127.1081700982303],
        [37.03412411628573, 127.1603202617985],
        [36.97484657484367, 127.31544979850715]
      ],
      "중부내륙고속도로": [
        [35.1000, 128.4500],
        [35.5000, 128.2000],
        [36.0000, 128.0000],
        [36.6000, 127.9000],
        [37.2000, 127.8000]
      ]
    };

    var map;
    var currentPolyline = null;
    var infowindow = null;
    var allMarkers = [];

    // [핵심] 고정 타이머 대신, "마지막 마커 상호작용 시각"을 기록해
    // 그 시각으로부터 SUPPRESS_WINDOW_MS 이내의 map click은 무시합니다.
    // 모바일 탭 지연(탭→클릭 합성 지연)이 기기·브라우저마다 달라
    // 고정 타이머보다 이 방식이 훨씬 안정적입니다.
    var lastMarkerInteractionAt = 0;
    var SUPPRESS_WINDOW_MS = 600;

    function markMarkerInteraction() {
      lastMarkerInteractionAt = Date.now();
    }

    function isWithinSuppressWindow() {
      return (Date.now() - lastMarkerInteractionAt) < SUPPRESS_WINDOW_MS;
    }

    function buildContent(p) {
      // 순서: 휴게소명 → 브랜드 → 운영사 → 연매출액 → 계약기간 → 담당자
      return '<div style="padding:8px;font-size:13px;line-height:1.6;min-width:160px;">' +
               '<b style="font-size:14px;">' + p.name + '</b><br>' +
               '브랜드: ' + p.brand + '<br>' +
               '운영사: ' + p.operator + '<br>' +
               '연매출액: ' + p.revenue + '<br>' +
               '계약기간: ' + p.contract + '<br>' +
               '담당자: ' + p.manager +
             '</div>';
    }

    function drawRoute(highway) {
      if (currentPolyline) {
        currentPolyline.setMap(null);
        currentPolyline = null;
      }
      var route = HIGHWAY_ROUTES[highway];
      if (!route || !route.length) {
        console.warn('정의된 노선 좌표가 없습니다: ' + highway);
        return;
      }
      var path = route.map(function (c) {
        return new kakao.maps.LatLng(c[0], c[1]);
      });
      currentPolyline = new kakao.maps.Polyline({
        path: path,
        strokeWeight: 7,
        strokeColor: '#FF3B30',
        strokeOpacity: 0.95,
        strokeStyle: 'solid'
      });
      currentPolyline.setMap(map);
    }

    function highlightMarkers(highway) {
      allMarkers.forEach(function (item) {
        if (item.point.highway === highway) {
          item.marker.setOpacity(1.0);
          item.marker.setZIndex(10);
        } else {
          item.marker.setOpacity(0.25);
          item.marker.setZIndex(1);
        }
      });
    }

    function resetMarkers() {
      allMarkers.forEach(function (item) {
        item.marker.setOpacity(1.0);
        item.marker.setZIndex(2);
      });
    }

    function selectHighway(p) {
      drawRoute(p.highway);
      highlightMarkers(p.highway);
    }

    // 마커 클릭/터치 시 공통으로 실행되는 핸들러
    function handleMarkerActivate(marker, p, content) {
      markMarkerInteraction();          // "방금 마커와 상호작용했다" 기록
      infowindow.setContent(content);
      infowindow.open(map, marker);
      selectHighway(p);
    }

    function initMap(points, query) {
      var container = document.getElementById('map');
      var center = points.length
        ? new kakao.maps.LatLng(points[0].lat, points[0].lng)
        : new kakao.maps.LatLng(36.5, 127.8);

      map = new kakao.maps.Map(container, { center: center, level: 8 });
      infowindow = new kakao.maps.InfoWindow({ zIndex: 20 });

      points.forEach(function (p) {
        var pos = new kakao.maps.LatLng(p.lat, p.lng);
        var marker = new kakao.maps.Marker({ position: pos, map: map });
        allMarkers.push({ marker: marker, point: p });

        var content = buildContent(p);

        // PC: 마우스 오버로 정보 미리보기
        kakao.maps.event.addListener(marker, 'mouseover', function () {
          infowindow.setContent(content);
          infowindow.open(map, marker);
        });
        kakao.maps.event.addListener(marker, 'mouseout', function () {
          infowindow.close();
        });

        // 클릭(PC 클릭 + 모바일 탭이 합성 click으로 들어오는 경우)
        kakao.maps.event.addListener(marker, 'click', function (mouseEvent) {
          // 이벤트 객체에 stopPropagation이 있으면 방어적으로 호출
          // (카카오맵 SDK 버전에 따라 존재하지 않을 수 있어 안전하게 체크)
          if (mouseEvent && typeof mouseEvent.stopPropagation === 'function') {
            mouseEvent.stopPropagation();
          }
          handleMarkerActivate(marker, p, content);
        });

        // 일부 모바일 브라우저 대응: touchstart도 시도
        // (Marker가 공식 지원하는 이벤트는 아니므로 실패해도 무해하게 무시)
        try {
          kakao.maps.event.addListener(marker, 'touchstart', function (mouseEvent) {
            if (mouseEvent && typeof mouseEvent.stopPropagation === 'function') {
              mouseEvent.stopPropagation();
            }
            handleMarkerActivate(marker, p, content);
          });
        } catch (e) {
          // touchstart 리스너 등록이 지원되지 않는 환경 - 무시
        }
      });

      // 지도 빈 곳 클릭 시 강조 해제
      // 단, 방금 마커를 클릭/터치한 여파로 발생한 map click이면 무시
      kakao.maps.event.addListener(map, 'click', function () {
        if (isWithinSuppressWindow()) return;
        infowindow.close();
        if (currentPolyline) { currentPolyline.setMap(null); currentPolyline = null; }
        resetMarkers();
      });

      // 검색어(q): 부분 일치 휴게소로 이동 + 정보창 + 노선 강조
      if (query) {
        var q = query.toLowerCase();
        var hit = null;
        for (var i = 0; i < allMarkers.length; i++) {
          if (allMarkers[i].point.name.toLowerCase().indexOf(q) !== -1) {
            hit = allMarkers[i];
            break;
          }
        }
        if (hit) {
          markMarkerInteraction();
          map.setLevel(6);
          map.panTo(hit.marker.getPosition());
          infowindow.setContent(buildContent(hit.point));
          infowindow.open(map, hit.marker);
          selectHighway(hit.point);
        }
      }
    }

    kakao.maps.load(function () {
      var params = new URLSearchParams(window.location.search);
      var raw = params.get('data');
      var query = params.get('q');
      var points = [];
      if (raw) {
        try {
          points = JSON.parse(decodeURIComponent(atob(raw)));
        } catch (e) {
          console.error('데이터 파싱 오류', e);
        }
      }
      initMap(points, query);
    });
  </script>
</body>
</html>
