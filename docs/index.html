<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    #resetBtn {
      position: absolute; top: 10px; right: 10px; z-index: 100;
      padding: 8px 12px; font-size: 13px; border: none; border-radius: 6px;
      background: #333; color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3);
      cursor: pointer;
    }
    #debugPanel {
      position: absolute; left: 0; bottom: 0; z-index: 100;
      max-height: 35%; width: 100%; overflow-y: auto;
      background: rgba(0,0,0,.8); color: #0f0; font: 12px monospace;
      padding: 6px; display: none; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="resetBtn">전체 보기</button>
  <div id="debugPanel"></div>

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fbd1e96068b754f1939c7e11a2790ce1&autoload=false"></script>
  <script>
    var HIGHWAY_ROUTES = {
      "평택영월고속도로": [
        [37.04865840817568, 126.91955476593384],
        [37.04607817131007, 126.94572715718608],
        [37.0313455713912, 126.97158756314981],
        [37.0249688329813, 127.01096844170729],
        [37.02561344138778, 127.03331017977634],
        [37.03490397784772, 127.1081700982303],
        [37.03412411628573, 127.1603202617985],
        [36.97484657484367, 127.31544979850715]
      ],
      "중부내륙고속도로": [
        [35.1000, 128.4500],
        [35.5000, 128.2000],
        [36.0000, 128.0000],
        [36.6000, 127.9000],
        [37.2000, 127.8000]
      ]
    };

    var map, currentPolyline = null, infowindow = null, allMarkers = [];
    var DEBUG = false;

    function log(msg) {
      if (!DEBUG) return;
      var el = document.getElementById('debugPanel');
      el.textContent += msg + "\n";
      el.scrollTop = el.scrollHeight;
    }

    // 시트 값/코드 키의 공백 차이로 인한 매칭 실패를 줄이기 위한 정규화
    function normalize(s) {
      return (s == null ? "" : String(s)).replace(/\s+/g, "").trim();
    }
    // 정규화 키로 노선을 찾기 위한 사전 구성
    var ROUTE_LOOKUP = {};
    (function () {
      for (var k in HIGHWAY_ROUTES) {
        if (HIGHWAY_ROUTES.hasOwnProperty(k)) ROUTE_LOOKUP[normalize(k)] = HIGHWAY_ROUTES[k];
      }
    })();

    function buildContent(p) {
      return '<div style="padding:8px;font-size:13px;line-height:1.6;min-width:160px;">' +
               '<b style="font-size:14px;">' + p.name + '</b><br>' +
               '브랜드: ' + p.brand + '<br>' +
               '운영사: ' + p.operator + '<br>' +
               '연매출액: ' + p.revenue + '<br>' +
               '계약기간: ' + p.contract + '<br>' +
               '담당자: ' + p.manager +
             '</div>';
    }

    function drawRoute(highway) {
      if (currentPolyline) { currentPolyline.setMap(null); currentPolyline = null; }
      var route = ROUTE_LOOKUP[normalize(highway)];
      if (!route || !route.length) {
        log('❌ 노선 좌표 없음: "' + highway + '" (정규화="' + normalize(highway) + '")');
        return;
      }
      log('✅ 노선 그림: "' + highway + '" (' + route.length + '개 좌표)');
      var path = route.map(function (c) { return new kakao.maps.LatLng(c[0], c[1]); });
      currentPolyline = new kakao.maps.Polyline({
        path: path, strokeWeight: 7, strokeColor: '#FF3B30',
        strokeOpacity: 0.95, strokeStyle: 'solid'
      });
      currentPolyline.setMap(map);
    }

    function highlightMarkers(highway) {
      var target = normalize(highway);
      allMarkers.forEach(function (item) {
        if (normalize(item.point.highway) === target) {
          item.marker.setOpacity(1.0); item.marker.setZIndex(10);
        } else {
          item.marker.setOpacity(0.25); item.marker.setZIndex(1);
        }
      });
    }

    function resetAll() {
      if (currentPolyline) { currentPolyline.setMap(null); currentPolyline = null; }
      infowindow.close();
      allMarkers.forEach(function (item) {
        item.marker.setOpacity(1.0); item.marker.setZIndex(2);
      });
      log('↺ 전체 초기화');
    }

    function selectHighway(p) {
      log('👉 selectHighway 실행: ' + p.name + ' / highway=' + p.highway);
      drawRoute(p.highway);
      highlightMarkers(p.highway);
    }

    function activate(marker, p, content) {
      infowindow.setContent(content);
      infowindow.open(map, marker);
      selectHighway(p);
    }

    function initMap(points, query) {
      var container = document.getElementById('map');
      var center = points.length
        ? new kakao.maps.LatLng(points[0].lat, points[0].lng)
        : new kakao.maps.LatLng(36.5, 127.8);
      map = new kakao.maps.Map(container, { center: center, level: 8 });
      infowindow = new kakao.maps.InfoWindow({ zIndex: 20 });

      points.forEach(function (p) {
        var pos = new kakao.maps.LatLng(p.lat, p.lng);
        var marker = new kakao.maps.Marker({ position: pos, map: map });
        allMarkers.push({ marker: marker, point: p });
        var content = buildContent(p);

        // PC 미리보기
        kakao.maps.event.addListener(marker, 'mouseover', function () {
          infowindow.setContent(content); infowindow.open(map, marker);
        });
        kakao.maps.event.addListener(marker, 'mouseout', function () {
          infowindow.close();
        });

        // PC 클릭 + 모바일 탭(합성 click): 카카오 마커의 click은 모바일 탭에서도 발생
        kakao.maps.event.addListener(marker, 'click', function () {
          log('🖱 marker click: ' + p.name);
          activate(marker, p, content);
        });

        // 모바일 보강: 실제 터치 종료(touchend)를 마커 이미지 DOM에서 직접 감지
        // 카카오 Marker는 touchend 리스너를 공식 지원하지 않으므로,
        // 마우스업 이벤트도 함께 걸어 최대한 넓게 커버합니다.
        kakao.maps.event.addListener(marker, 'mouseup', function () {
          log('🖱 marker mouseup: ' + p.name);
          activate(marker, p, content);
        });
      });

      // 지도 클릭으로 초기화하는 로직은 "제거"했습니다.
      // → 마커 이벤트와 경쟁할 여지가 원천 차단됩니다.
      // 초기화는 오직 명시적 버튼으로만 수행합니다.
      document.getElementById('resetBtn').addEventListener('click', resetAll);

      if (query) {
        var nq = query.toLowerCase();
        var hit = null;
        for (var i = 0; i < allMarkers.length; i++) {
          if (allMarkers[i].point.name.toLowerCase().indexOf(nq) !== -1) { hit = allMarkers[i]; break; }
        }
        if (hit) {
          map.setLevel(6);
          map.panTo(hit.marker.getPosition());
          activate(hit.marker, hit.point, buildContent(hit.point));
        }
      }
    }

    kakao.maps.load(function () {
      var params = new URLSearchParams(window.location.search);
      DEBUG = params.get('debug') === '1';
      if (DEBUG) document.getElementById('debugPanel').style.display = 'block';

      var raw = params.get('data');
      var query = params.get('q');
      var points = [];
      if (raw) {
        try { points = JSON.parse(decodeURIComponent(atob(raw))); }
        catch (e) { log('데이터 파싱 오류: ' + e); }
      }
      log('총 마커 수: ' + points.length);
      initMap(points, query);
    });
  </script>
</body>
</html>
